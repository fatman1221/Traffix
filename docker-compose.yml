# MinIO 本地对象存储（S3 兼容）
# 启动: docker compose up -d
# 控制台: http://127.0.0.1:9001 （账号密码与 backend/env 中 MINIO_ACCESS_KEY / MINIO_SECRET_KEY 一致）
services:
  minio:
    # 使用 Quay.io 官方镜像，避免 docker.io 经阿里云等镜像加速时出现 403
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  minio_data:
